name: Build Environment Pipeline

# -------------------------------------------------------------------------
# TRIGGERS
# -------------------------------------------------------------------------
on:
  repository_dispatch:
    types: [trigger-external-id-jd863f]

#
#  HTTP Request
#
# {
#   "event_type": "trigger-external-id-jd863f",
#   "client_payload": {
#     "request_id": "req-uuid-abc123xyz",
#     "vm_imageid": "ami-0c55b159cbfafe1f0",
#     "vm_size": "t3.medium",
#     "vm_number": "3",
#     "vm_os": "linux"
#   }
# }


# -------------------------------------------------------------------------
# GLOBAL ENVIRONMENT - TRIGGER PAYLOAD VARIABLES
# -------------------------------------------------------------------------
  env:
  TF_VAR_request_id: ${{ github.event.client_payload.request_id }}
  TF_VAR_vm_imageid: ${{ github.event.client_payload.vm_imageid }}
  TF_VAR_vm_size: ${{ github.event.client_payload.vm_size }}
  TF_VAR_vm_count: ${{ github.event.client_payload.vm_count }}
  TF_VAR_vm_os: ${{ github.event.client_vm_os }}

permissions:
  id-token: write
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # JOB: INPUTS AUDIT & VALIDATION
  # -------------------------------------------------------------------------
  input_parameters:
    name: "Audit Input Parameters"
    runs-on: ubuntu-latest

    steps:
      - name: Log Inputs
        run: |
          echo "Target OS       : $TF_VAR_vm_os"
          echo "Compute Size    : $TF_VAR_vm_size"
          echo "Target Instances: $TF_VAR_vm_count"
          echo "Image Identifier: $TF_VAR_vm_imageid"
          echo "Request ID      : $TF_VAR_request_id"

      - name: Validate OS
        run: |
          if [ "$TF_VAR_vm_os" != "linux" ]; then
            echo "::error:: Unsupported OS constraint ($TF_VAR_vm_os). Pipeline restricted to Linux environments."
            exit 1
          fi

      - name: Validate Compute Size
        run: |
          case "${TF_VAR_vm_size,,}" in
            small|middle|large)
              echo "Validated: Compute size choice ($TF_VAR_vm_size) matches policy."
              ;;
            *)
              echo "::error:: Invalid compute profile size ($TF_VAR_vm_size). Permitted selections are: small, middle, large."
              exit 1
              ;;
          esac

      - name: Validate Instance Count
        run: |
          if ! [[ "$TF_VAR_vm_count" =~ ^[0-9]+$ ]]; then
            echo "::error:: Invalid format for instance count ($TF_VAR_vm_count). Value must be a valid integer."
            exit 1
          fi

          if [ "$TF_VAR_vm_count" -lt 1 ] || [ "$TF_VAR_vm_count" -gt 5 ]; then
            echo "::error:: Instance count ($TF_VAR_vm_count) is out of bounds. Permitted threshold is between 1 and 5."
            exit 1
          fi

      - name: Validate Image Identifier
        run: |
          if [[ "$TF_VAR_vm_imageid" =~ [\'\"\;\|\&\<\>\`] ]]; then
            echo "::error:: Malicious script characters detected in image identifier. Aborting execution."
            exit 1
          fi

      - name: Validate Request ID
        run: |
          if [ -z "$TF_VAR_request_id" ]; then
            echo "::error:: Request ID is missing or empty. A valid request ID must be provided."
            exit 1
          fi

          if ! [[ "$TF_VAR_request_id" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error:: Invalid request ID ($TF_VAR_request_id). Only alphanumeric characters, hyphens, and underscores are permitted."
            exit 1
          fi


  # -------------------------------------------------------------------------
  # JOB: TERRAFORM PLAN 
  # -------------------------------------------------------------------------
  terraform_plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: [resolve_image_metadata]
    environment: test

    env:
      TF_VAR_azure_image_id: ${{ needs.resolve_image_metadata.outputs.azure_image_id }}

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Mirror Code Repository
        uses: actions/checkout@v4

      - name: Connect to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Initialize Terraform Engine
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Validate Terraform Configuration
        run: |
          terraform init
          terraform validate

      - name: Generate Execution Plan
        run: terraform plan -no-color -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ./terraform/tfplan

  # -------------------------------------------------------------------------
  # JOB: TERRAFORM APPLY
  # -------------------------------------------------------------------------
  terraform_apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: [terraform_plan, resolve_image_metadata]
    environment: production

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Mirror Code Repository
        uses: actions/checkout@v4

      - name: Connect to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Initialize Terraform Engine
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Initialize Terraform Backend
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ./terraform

      - name: Apply Infrastructure Changes
        run: terraform apply -input=false tfplan

      - name: Capture Terraform Outputs
        run: terraform output -json > terraform-outputs.json

      - name: Upload Terraform Outputs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: ./terraform/terraform-outputs.json
