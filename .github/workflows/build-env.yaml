name: Build Environment Pipeline

on:
  workflow_dispatch:
    inputs:
      number_of_copies:
        description: 'Number of copies to generate'
        required: true
        default: '1'
        type: string
      size:
        description: 'Select the size'
        required: true
        default: 'medium'
        type: choice
        options:
          - small
          - medium
          - large
      os:
        description: 'Target Operating System'
        required: true
        default: 'Linux'
        type: string
      image_name:
        description: 'The name of the Azure Gallery Image'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  # Job 1: Log all received inputs
  display_parameters:
    runs-on: ubuntu-latest
    steps:
      - name: Display all initial input parameters
        run: |
          echo "==== Received Input Parameters ===="
          echo "Copies: ${{ github.event.inputs.number_of_copies }}"
          echo "Size: ${{ github.event.inputs.size }}"
          echo "OS: ${{ github.event.inputs.os }}"
          echo "Image Name: ${{ github.event.inputs.image_name }}"
          echo "==================================="

  # Job 2: Get image reference definition from Azure
  get_image:
    runs-on: ubuntu-latest
    needs: display_parameters
    environment: test # Get secrets from the "test" environment
    outputs:
      azure_image_id: ${{ steps.fetch_step.outputs.IMAGE_ID }}
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Azure Gallery Image Details
        id: fetch_step
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            # Fetch the base resource ID of the image definition
            RESOLVED_ID=$(az sig image-definition show \
              --resource-group "MyGalleryResourceGroup" \
              --gallery-name "MyComputeGallery" \
              --gallery-image-definition "${{ github.event.inputs.image_name }}" \
              --query id --output tsv)
              
            echo "Successfully resolved Image Resource ID: $RESOLVED_ID"
            echo "IMAGE_ID=$RESOLVED_ID" >> "$GITHUB_OUTPUT"

  # Job 3: Download the binary image locally
  download_image:
    runs-on: ubuntu-latest
    needs: get_image
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Export and Download VHD Binary
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            # 1. Fetch the latest concrete version identifier for the image definition
            LATEST_VERSION=$(az sig image-version list \
              --resource-group "MyGalleryResourceGroup" \
              --gallery-name "MyComputeGallery" \
              --gallery-image-definition "${{ github.event.inputs.image_name }}" \
              --query "[0].name" -o tsv)
            
            IMAGE_VERSION_ID="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/MyGalleryResourceGroup/providers/Microsoft.Compute/galleries/MyComputeGallery/images/${{ github.event.inputs.image_name }}/versions/$LATEST_VERSION"
            
            echo "Targeting Image Version Resource ID: $IMAGE_VERSION_ID"
            
            # 2. Export the version disk reference to a standalone target managed disk
            echo "Creating temporary export managed disk..."
            az disk create \
              --resource-group "MyGalleryResourceGroup" \
              --name "TempExportDisk-${{ github.run_id }}" \
              --gallery-image-reference "$IMAGE_VERSION_ID" \
              --location "eastus"
              
            # 3. Request a temporary Read SAS Token URL link valid for 3600 seconds (1 hour)
            echo "Generating secure downloadable SAS URL string..."
            SAS_URL=$(az disk grant-access \
              --resource-group "MyGalleryResourceGroup" \
              --name "TempExportDisk-${{ github.run_id }}" \
              --duration-in-seconds 3600 \
              --access-level Read \
              --query accessSas -o tsv)
              
            # 4. Stream the raw operating system payload into the local workspace file block
            echo "Downloading binary VHD file..."
            azcopy copy "$SAS_URL" "./target_image.vhd"
            
            # 5. Clean up Azure assets by revoking disk access permissions and deleting the disk
            echo "Cleaning up remote cloud resources..."
            az disk revoke-access --resource-group "MyGalleryResourceGroup" --name "TempExportDisk-${{ github.run_id }}"
            az disk delete --resource-group "MyGalleryResourceGroup" --name "TempExportDisk-${{ github.run_id }}" --yes

  # Job 4: Process the image
  process_deployment:
    runs-on: ubuntu-latest
    needs: download_image
    steps:
      - name: Display status
        run: |
          echo "Pipeline processing."
          echo "END"
