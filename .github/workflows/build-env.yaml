name: Build Environment Pipeline

on:
  # External trigger event sent via GitHub API from another system
  repository_dispatch:
    types: [external-build-trigger-event]

# GLOBAL ENVIRONMENT VARIABLES
env:
  COPIES: ${{ github.event.client_payload.copies }}
  SIZE: ${{ github.event.client_payload.size }}
  OS: ${{ github.event.client_payload.os }}
  IMAGE_NAME: ${{ github.event.client_payload.image_name }}

permissions:
  # Azure login needs
  id-token: write
  # Strip away the defaults
  contents: read

jobs:
  # Job 1: Validate input parameters
  validate_inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Sanitize Inputs
        run: |
          echo "Validation..."

          if [ "$OS" != "linux" ]; then
            echo "::error:: Unsupported OS ($OS). Only 'linux' is permitted."
            exit 1
          fi
        
        echo "Success: All input parameters passed validation."

  # Job 2: Displays input parameters
  display_parameters:
    runs-on: ubuntu-latest
    steps:
      - name: Display Input Parameters
        run: |
          echo "COPIES=$COPIES"
          echo "SIZE=$SIZE"
          echo "OS=$OS"
          echo "IMAGE_NAME=$IMAGE_NAME"

  # Job 3: Get image ID from Azure Compute Gallery and set as output for downstream jobs 
  get_image:
    runs-on: ubuntu-latest
    environment: test
    outputs:
      azure_image_id: ${{ steps.fetch_step.outputs.IMAGE_ID }}
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Azure Gallery Image Details
        id: fetch_step
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            RESOLVED_ID=$(az sig image-definition show \
              --resource-group "MyGalleryResourceGroup" \
              --gallery-name "MyComputeGallery" \
              --gallery-image-definition "$IMAGE_NAME" \
              --query id --output tsv)
              
            echo "Successfully resolved Image Resource ID: $RESOLVED_ID"
            echo "IMAGE_ID=$RESOLVED_ID" >> "$GITHUB_OUTPUT"

  # Job 4: Get the latest image version
  download_image:
    runs-on: ubuntu-latest
    environment: test 
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Export and Download VHD Binary
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            LATEST_VERSION=$(az sig image-version list \
              --resource-group "MyGalleryResourceGroup" \
              --gallery-name "MyComputeGallery" \
              --gallery-image-definition "$IMAGE_NAME" \
              --query "[0].name" -o tsv)
            
            IMAGE_VERSION_ID="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/MyGalleryResourceGroup/providers/Microsoft.Compute/galleries/MyComputeGallery/images/$IMAGE_NAME/versions/$LATEST_VERSION"
            
            echo "Targeting Image Version Resource ID: $IMAGE_VERSION_ID"
            
            echo "Creating temporary export managed disk..."
            az disk create \
              --resource-group "MyGalleryResourceGroup" \
              --name "TempExportDisk-${{ github.run_id }}" \
              --gallery-image-reference "$IMAGE_VERSION_ID" \
              --location "eastus"
              
            echo "Generating secure downloadable SAS URL string..."
            SAS_URL=$(az disk grant-access \
              --resource-group "MyGalleryResourceGroup" \
              --name "TempExportDisk-${{ github.run_id }}" \
              --duration-in-seconds 3600 \
              --access-level Read \
              --query accessSas -o tsv)
              
            echo "Downloading binary VHD file..."
            azcopy copy "$SAS_URL" "./target_image.vhd"
            
            echo "Cleaning up remote cloud resources..."
            az disk revoke-access --resource-group "MyGalleryResourceGroup" --name "TempExportDisk-${{ github.run_id }}"
            az disk delete --resource-group "MyGalleryResourceGroup" --name "TempExportDisk-${{ github.run_id }}" --yes

  # Job 5: Process the image
  process_deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Display status
        run: |
          echo "Pipeline processing completed for $IMAGE_NAME."

  # Job 6: Deploy infrastructure using Terraform
  terraform-azure:
    name: "Terraform Azure Apply"
    runs-on: ubuntu-latest
    environment: test
    
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        # Pass the global env vars as tf-vars so Terraform can capture them natively
        run: terraform plan -no-color -var="vm_size=$SIZE" -var="vm_count=$COPIES"

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var="vm_size=$SIZE" -var="vm_count=$COPIES"
